```html
<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Riya & Akansha - NLP Web Assistant</title>
    <!-- Tailwind CSS for styling -->
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        /* Custom scrollbar for chat area */
        #chat-box::-webkit-scrollbar {
            width: 6px;
        }
        #chat-box::-webkit-scrollbar-thumb {
            background-color: #cbd5e1;
            border-radius: 10px;
        }
        .user-msg {
            background-color: #dbeafe; /* Light blue bubble for user */
            color: #1e3a8a;
            align-self: flex-end;
            border-bottom-right-radius: 0;
        }
        .bot-msg {
            background-color: #f3f4f6; /* Light gray bubble for bot */
            color: #1f2937;
            align-self: flex-start;
            border-bottom-left-radius: 0;
        }
        .msg-bubble {
            max-width: 80%;
            padding: 10px 14px;
            border-radius: 16px;
            margin-bottom: 12px;
            word-wrap: break-word;
            box-shadow: 0 1px 2px rgba(0,0,0,0.05);
        }
    </style>
</head>
<body class="bg-gray-100 h-screen flex flex-col items-center justify-center p-4 font-sans">

    <!-- Mobile-friendly App Container -->
    <div class="w-full max-w-md bg-white rounded-2xl shadow-xl overflow-hidden flex flex-col h-[600px] max-h-full">
        
        <!-- Header -->
        <div class="bg-blue-600 text-white p-4 text-center shadow-md z-10 flex items-center justify-between">
            <div>
                <h1 class="text-xl font-bold">NLP Assistant</h1>
                <p class="text-xs text-blue-200">Project by Riya & Akansha</p>
            </div>
            <!-- Online Status Indicator -->
            <div class="flex items-center">
                <span class="w-2 h-2 rounded-full bg-green-400 animate-pulse mr-1"></span>
                <span class="text-xs">Online</span>
            </div>
        </div>

        <!-- Chat Area -->
        <div id="chat-box" class="flex-1 overflow-y-auto p-4 flex flex-col bg-slate-50">
            <!-- Initial Greeting -->
            <div class="msg-bubble bot-msg">
                Hello! I am your web-based NLP assistant. Here is what I can help you with:<br>
                • Time / Date<br>
                • Calculations (e.g., calculate 5 * 20)<br>
                • Wikipedia search (e.g., wikipedia Python)<br>
                • Tell a joke
            </div>
        </div>

        <!-- Input Area -->
        <div class="p-3 bg-white border-t border-gray-200 flex items-center gap-2">
            
            <!-- Voice Input Button -->
            <button id="mic-btn" class="p-3 bg-gray-100 text-gray-600 rounded-full hover:bg-gray-200 transition touch-manipulation flex-shrink-0" title="Voice Input">
                <svg xmlns="http://www.w3.org/2000/svg" width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M12 2a3 3 0 0 0-3 3v7a3 3 0 0 0 6 0V5a3 3 0 0 0-3-3Z"></path><path d="M19 10v2a7 7 0 0 1-14 0v-2"></path><line x1="12" y1="19" x2="12" y2="22"></line></svg>
            </button>

            <!-- Text Input Field -->
            <input type="text" id="user-input" class="flex-1 bg-gray-100 rounded-full px-4 py-2.5 outline-none focus:ring-2 focus:ring-blue-500 text-sm" placeholder="Message assistant..." autocomplete="off">
            
            <!-- Send Button -->
            <button id="send-btn" class="p-3 bg-blue-600 text-white rounded-full hover:bg-blue-700 transition shadow-md touch-manipulation flex-shrink-0">
                <svg xmlns="http://www.w3.org/2000/svg" width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><line x1="22" y1="2" x2="11" y2="13"></line><polygon points="22 2 15 22 11 13 2 9 22 2"></polygon></svg>
            </button>
        </div>
    </div>

    <script>
        const chatBox = document.getElementById('chat-box');
        const userInput = document.getElementById('user-input');
        const sendBtn = document.getElementById('send-btn');
        const micBtn = document.getElementById('mic-btn');

        // Initialize Text-to-Speech
        const synth = window.speechSynthesis;

        function addMessage(sender, text) {
            const div = document.createElement('div');
            div.className = `msg-bubble ${sender === 'user' ? 'user-msg' : 'bot-msg'}`;
            // Convert newlines to HTML breaks for proper display
            div.innerHTML = text.replace(/\n/g, '<br>');
            chatBox.appendChild(div);
            // Auto scroll to the newest message
            chatBox.scrollTop = chatBox.scrollHeight;

            // Only the bot speaks the messages
            if (sender === 'bot') {
                speak(text);
            }
        }

        function speak(text) {
            if (synth && synth.speaking) {
                synth.cancel(); // Stop any current speech
            }
            // Remove HTML tags so the bot doesn't read "<br>" or "<strong>" out loud
            let cleanText = text.replace(/<[^>]*>?/gm, ''); 
            const utterThis = new SpeechSynthesisUtterance(cleanText);
            utterThis.rate = 1.0; 
            utterThis.lang = 'en-US';
            synth.speak(utterThis);
        }

        // ==========================================
        // JavaScript NLP Logic (Replica of Python Logic)
        // ==========================================
        function cleanText(text) {
            // Lowercase and tokenize the string
            let words = text.toLowerCase().match(/\w+/g) || [];
            // Remove common filler words
            let stopwords = ['is', 'a', 'the', 'an', 'please', 'can', 'you', 'me', 'tell', 'what', 'who', 'show', 'give', 'get', 'look', 'up', 'for', 'search', 'do', 'does', 'did', 'about', 'on', 'in', 'of', 'and', 'to', 'it', 'that', 'help'];
            return words.filter(w => !stopwords.includes(w));
        }

        function safeEval(expr) {
            // Strict Regex: Allow only numbers and basic math operators for safety
            let cleanExpr = expr.replace(/[xX]/g, '*').replace(/[^0-9\.\+\-\*\/\%\(\) ]/g, '');
            try {
                return new Function('return ' + cleanExpr)();
            } catch (e) {
                return null;
            }
        }

        async function fetchWikipedia(query) {
            addMessage('bot', "Searching my knowledge base...");
            try {
                // Fetch data using Wikipedia's REST API
                const response = await fetch(`https://en.wikipedia.org/api/rest_v1/page/summary/${encodeURIComponent(query)}`);
                const data = await response.json();
                
                if (data.type === "disambiguation") {
                    addMessage('bot', "There are multiple matches for this topic. Please be more specific.");
                } else if (data.extract) {
                    addMessage('bot', `<strong>Wikipedia:</strong><br>${data.extract}`);
                } else {
                    addMessage('bot', "I couldn't find any information on that topic.");
                }
            } catch (error) {
                addMessage('bot', "I am currently unable to connect to the internet.");
            }
        }

        function processCommand(rawText) {
            let text = rawText.toLowerCase();
            // Extract core meaning using the NLP function
            let keywords = cleanText(text);
            
            console.log("[NLP Debug] Extracted Keywords:", keywords);

            // Intent: Greetings
            if (['hello', 'hi', 'hey'].some(w => keywords.includes(w))) {
                addMessage('bot', "Hello! How can I assist you today?");
                return;
            }

            // Intent: Time
            if (keywords.includes('time')) {
                let time = new Date().toLocaleTimeString('en-US', {hour: '2-digit', minute:'2-digit'});
                addMessage('bot', `The current time is ${time}.`);
                return;
            }

            // Intent: Date
            if (keywords.includes('date') || keywords.includes('today')) {
                let date = new Date().toLocaleDateString('en-US', { weekday: 'long', year: 'numeric', month: 'long', day: 'numeric' });
                addMessage('bot', `Today's date is ${date}.`);
                return;
            }

            // Intent: Joke
            if (keywords.includes('joke') || keywords.includes('funny')) {
                let jokes = [
                    "Why do programmers prefer dark mode? Because light attracts bugs!",
                    "There are 10 types of people in the world: those who understand binary, and those who don't."
                ];
                addMessage('bot', jokes[Math.floor(Math.random() * jokes.length)]);
                return;
            }

            // Intent: Wikipedia Search
            if (keywords.includes('wikipedia') || keywords.includes('about')) {
                let query = text.replace(/wikipedia/g, '').replace(/about/g, '').replace(/tell/g, '').trim();
                if(query) {
                    fetchWikipedia(query);
                } else {
                    addMessage('bot', "What topic would you like me to search for?");
                }
                return;
            }

            // Intent: Math Calculation
            let isMath = /^[0-9\s\+\-\*\/\(\)\.]+$/.test(text.replace(/[A-Za-z]/g, '').trim());
            if (keywords.includes('calculate') || text.includes('what is') || text.match(/\d+\s*[\+\-\*\/]\s*\d+/)) {
                let expr = text.replace(/calculate|what is/g, '').trim();
                let result = safeEval(expr);
                if (result !== null) {
                    addMessage('bot', `${expr} = <strong>${result}</strong>`);
                    return;
                }
            }

            // Fallback Handler
            addMessage('bot', "I am sorry, I didn't understand that command. Try asking for the 'time', 'date', or say 'wikipedia [topic]'.");
        }

        // ==========================================
        // Event Listeners (Handling Inputs)
        // ==========================================
        
        function handleSend() {
            let text = userInput.value.trim();
            if (text) {
                addMessage('user', text);
                userInput.value = '';
                // Add slight 500ms delay for a realistic processing feel
                setTimeout(() => processCommand(text), 500);
            }
        }

        sendBtn.addEventListener('click', handleSend);
        userInput.addEventListener('keypress', (e) => {
            if (e.key === 'Enter') handleSend();
        });

        // Web Speech API for Voice Input
        const SpeechRecognition = window.SpeechRecognition || window.webkitSpeechRecognition;
        if (SpeechRecognition) {
            const recognition = new SpeechRecognition();
            recognition.continuous = false; // Stop after one phrase
            recognition.lang = 'en-US';

            recognition.onstart = function() {
                // Change UI to show it's listening
                micBtn.classList.add('bg-red-500', 'text-white');
                micBtn.classList.remove('bg-gray-100', 'text-gray-600');
                userInput.placeholder = "Listening...";
            };

            recognition.onresult = function(event) {
                // Get the spoken text
                const transcript = event.results[0][0].transcript;
                userInput.value = transcript;
                handleSend(); // Auto send after speaking
            };

            recognition.onerror = function(event) {
                addMessage('bot', "Voice recognition failed. Please type your command.");
            };

            recognition.onend = function() {
                // Revert UI back to normal
                micBtn.classList.remove('bg-red-500', 'text-white');
                micBtn.classList.add('bg-gray-100', 'text-gray-600');
                userInput.placeholder = "Message assistant...";
            };

            micBtn.addEventListener('click', () => {
                recognition.start();
            });
        } else {
            micBtn.addEventListener('click', () => {
                alert("Your browser does not support voice recognition. Please type your commands.");
            });
        }
    </script>
</body>
</html>
